services:
  # postgresql database
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: insider_league
      POSTGRES_USER: insider
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # laravel backend
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: insider_league
      DB_USERNAME: insider
      DB_PASSWORD: secret
    depends_on:
      - db

  # vue frontend
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data: